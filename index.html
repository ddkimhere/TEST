<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMS 월말평가 인쇄 및 편집 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .paper-preview { background-color: white; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); color: #111827; }
        .writing-line { border-bottom: 1px dotted #6b7280; height: 2.2rem; margin-top: 0.5rem; }
        .teacher-answer { color: #dc2626 !important; font-weight: bold; }
        @media print { .no-print { display: none !important; } .paper-preview { box-shadow: none !important; border: none !important; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- 시스템 상단바 -->
    <header class="no-print bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-50">
        <h1 class="font-bold">YMS 월말평가 AI 시스템</h1>
        <div class="flex gap-2">
            <button onclick="generateAll()" class="bg-indigo-600 px-3 py-1 rounded text-sm font-bold">🪄 전체 생성</button>
            <button onclick="triggerPrint()" class="bg-emerald-600 px-3 py-1 rounded text-sm font-bold">인쇄하기</button>
        </div>
    </header>

    <main class="flex flex-col lg:flex-row gap-6 p-6">
        <!-- 편집기 -->
        <div class="w-full lg:w-[400px] bg-white p-6 rounded-xl shadow-lg no-print">
            <h2 class="text-lg font-bold mb-4">선생님 문제 편집기</h2>
            <div class="space-y-4">
                <div>
                    <label class="block font-bold mb-1">지문 입력</label>
                    <textarea id="edit-reading" rows="10" class="w-full p-2 border rounded" oninput="render()"></textarea>
                    <button onclick="generateAI()" class="mt-2 w-full bg-purple-600 text-white p-2 rounded font-bold">🪄 이 지문으로 문제 생성</button>
                </div>
                <div>
                    <label class="block font-bold mb-1">단어 목록</label>
                    <textarea id="edit-vocab" rows="5" class="w-full p-2 border rounded" oninput="render()"></textarea>
                </div>
            </div>
        </div>

        <!-- 미리보기 -->
        <div class="flex-1">
            <div id="paper" class="paper-preview p-12 min-h-[297mm]">
                <h1 class="text-2xl font-bold mb-6 text-center border-b-2 pb-4">월간 평가 시험지</h1>
                <div id="paper-body" class="space-y-8"></div>
            </div>
        </div>
    </main>

    <script>
        let data = { 
            vocab: "Apple:사과\nBanana:바나나", 
            reading: "본문: People often need help. That is why each community has helpers. Firefighters work hard to put out fires. \n질문: 위 글의 요지는 무엇입니까?" 
        };

        function render() {
            data.vocab = document.getElementById('edit-vocab').value;
            data.reading = document.getElementById('edit-reading').value;
            
            const body = document.getElementById('paper-body');
            // 수직 배치(Stacked) 레이아웃 적용
            const readingParts = data.reading.split('\n질문:');
            const passage = readingParts[0].replace('본문:', '');
            const question = readingParts[1] || '질문 없음';

            body.innerHTML = `
                <div>
                    <h2 class="font-bold border-b mb-4 pb-2">I. 단어 영역</h2>
                    <pre class="whitespace-pre-wrap">${data.vocab}</pre>
                </div>
                <div>
                    <h2 class="font-bold border-b mb-4 pb-2">II. 독해 영역</h2>
                    <div class="bg-slate-50 p-4 border rounded mb-4 font-serif">${passage}</div>
                    <div class="font-bold text-lg mb-2">Q. ${question}</div>
                    <div class="writing-line"></div>
                </div>
            `;
        }

        async function generateAI() {
            alert("AI가 분석 중입니다...");
            // 실제 API 통신 로직 연결
            document.getElementById('edit-reading').value += "\n\n(AI 생성 질문: 위 글의 Firefighter의 역할은 무엇인가요?)";
            render();
        }

        function generateAll() { alert("전체 문제를 생성합니다."); }
        function triggerPrint() { window.print(); }

        // 초기화
        document.getElementById('edit-vocab').value = data.vocab;
        document.getElementById('edit-reading').value = data.reading;
        render();
    </script>
</body>
</html>
