<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMS 월말평가 인쇄 및 편집 관리 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap');
        
        body { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
        
        /* 지문 줄바꿈 보존 */
        .passage-text { white-space: pre-wrap; word-break: break-all; }

        .paper-preview { background-color: white; box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08); color: #111827; border: 1px solid #e2e8f0; }
        .writing-line { border-bottom: 1px dotted #475569; height: 2.3rem; margin-top: 0.4rem; }
        .teacher-answer { color: #dc2626 !important; font-weight: bold; font-family: 'Nanum Myeongjo', serif; }

        @media print {
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .paper-preview { box-shadow: none !important; border: none !important; width: 100% !important; }
            .avoid-break { break-inside: avoid !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-16">

    <!-- AI Loading Modal -->
    <div id="ai-loading-overlay" class="fixed inset-0 bg-slate-955/85 backdrop-blur-md z-[200] hidden flex flex-col items-center justify-center">
        <div class="bg-slate-900 p-8 rounded-2xl text-white text-center">
            <i class="fa-solid fa-wand-magic-sparkles text-4xl text-indigo-400 mb-4 animate-bounce"></i>
            <p id="ai-loading-step">Gemini AI가 문제를 구성하는 중...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="no-print bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="font-bold">YMS 인쇄 시스템</h1>
            <div class="flex gap-3">
                <button onclick="generateAIQuestionsAllPassages()" class="bg-indigo-600 px-3 py-2 rounded-lg text-xs font-bold">🪄 전체 AI 출제</button>
                <button onclick="toggleTeacherDrawer()" class="bg-slate-800 px-3 py-2 rounded-lg text-xs font-semibold">편집기</button>
                <button onclick="window.print()" class="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold">인쇄하기</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        <div id="teacher-drawer" class="no-print hidden mb-6 bg-slate-900 text-slate-100 rounded-xl p-5 border shadow-2xl space-y-4">
            <div id="reading-editor-list" class="space-y-4"></div>
            <button onclick="applyReadingChange()" class="bg-indigo-600 text-white text-xs px-4 py-2 rounded">독해 지문 반영</button>
        </div>

        <div id="print-sheet" class="paper-preview w-full max-w-[210mm] min-h-[297mm] p-12 mx-auto">
            <div class="pb-3 mb-5 border-b-2 border-slate-900">
                <span class="text-sm font-black text-slate-900">YMS ENGLISH</span>
                <h2 id="paper-title-display" class="text-center font-extrabold text-2xl my-3 font-serif"></h2>
                <div class="flex justify-between items-center bg-slate-50 border rounded-lg p-2 text-[11px] font-sans mt-4">
                    <span>시험 날짜: <span id="paper-date-display"></span></span>
                    <div class="flex gap-4"><span>Class: ______</span><span>성명(Name): ______</span></div>
                </div>
            </div>

            <div id="paper-content-area" class="space-y-8">
                <div id="paper-vocab-grid" class="grid grid-cols-2 gap-4"></div>
                <div id="paper-reading-list"></div>
                <div id="paper-translation-list"></div>
                <div id="paper-unscramble-list"></div>
            </div>
        </div>
    </main>

    <script>
        var isPaperTeacherMode = false;
        var vocabCount = 20, readingCount = 1, translationCount = 5, unscrambleCount = 5;
        var examData = { vocab: [], reading: [], translation: [], unscramble: [] };
        var apiKey = localStorage.getItem('monthly_exam_api_key') || '';

        // 단어 랜덤 추출 반영
        function applyVocabChange() {
            const engs = document.getElementById('edit-vocab-eng').value.split('\n').filter(x => x.trim());
            const kors = document.getElementById('edit-vocab-kor').value.split('\n').filter(x => x.trim());
            let arr = [];
            for (let i = 0; i < Math.min(engs.length, kors.length); i++) {
                arr.push({ word: engs[i].trim(), mean: kors[i].trim() });
            }
            examData.vocab = arr.sort(() => 0.5 - Math.random()).slice(0, vocabCount);
            renderPaperPreview();
            showToast("단어가 랜덤으로 추출되어 반영되었습니다.");
        }

        // 지문/문제 렌더링 (서술형 분리 및 유형 뱃지 제거)
        function renderPaperPreview() {

            // ... (서술형의 경우 answerText가 나오도록 수정)

        // AI 프롬프트 (서술형 필수 포함)
        async function generateAIQuestionsForPassage(pIdx) {
            const txt = document.getElementById(`edit-passage-${pIdx}`).value.trim();
            const overlay = document.getElementById('ai-loading-overlay');
            overlay.classList.remove('hidden');
            
            // 핵심: 3문제 중 1문제는 무조건 서술형, 유형명 노출 금지
            const prompt = `지문: "${txt}" 기반 3문제 출제. 3문제 중 '반드시 1문제'는 서술형("type": "descriptive", "questionCategory": "서술")이어야 함. 서술형은 영어 질문-영어 답안 형식으로 작성할 것. 나머지 2문제는 일반 유형(객관식/어순배열 등)으로 구성.
            JSON 규격만 리턴 (마크다운 금지): [{"q":"질문","type":"mcq"|"descriptive","questionCategory":"유형명","choices":["1","2","3","4","5"],"answer":1,"answerText":"정답예시"}]`;
            
            // ... (API 호출 및 데이터 처리 로직)
        }
        
        // ... (나머지 로직은 이전과 동일하게 유지)
    </script>
</body>
</html>
